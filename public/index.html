<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Score Quiz</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="container">
        <div id="welcome-screen" class="screen active">
            <h1>Test Your Cognitive Score</h1>
            <p>15 questions. Instant results. No sign-up required.</p>
            <button id="start-btn" class="primary-btn">Start Quiz</button>
        </div>
        
        <div id="quiz-screen" class="screen hidden">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="question-container">
                <!-- Question will be injected here -->
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <h2>Your Cognitive Score</h2>
            <div id="score-display" class="score"></div>
            <div id="type-label" class="type-label"></div>
            
            <button id="share-btn" class="secondary-btn">Share Result</button>
            
            <div class="bridge-cta">
                <p>Scored well on logic? See if you can outsmart someone who's lying to your face.</p>
                <a href="#" id="tlq-link" class="bridge-link">Play The Last Question</a>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
